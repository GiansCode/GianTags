# ┌─────────────────────────────────────────────────┐
# │                   GianTags                      │
# │              Tags Configuration                 │
# └─────────────────────────────────────────────────┘
#
# Tag identifier is the key (e.g. 'vip').
# Permission required: giantags.tag.<identifier>
#
# ── Item Meta Fields ─────────────────────────────
#  type            - Material name (e.g. DIAMOND)
#  amount          - Stack size (default: 1)
#  name            - MiniMessage display name
#  lore            - List of MiniMessage lore lines
#  selected-lore   - Lore override when this tag is the player's active tag
#  enchantments    - List of "enchantment_key:level" pairs
#  flags           - List of ItemFlag names (e.g. HIDE_ENCHANTS)
#  custom-model-data - Integer custom model data (default: 0)
#  glow            - Add glow effect without visible enchant (default: false)
#  skull-texture   - Base64 skull texture (only for PLAYER_HEAD)
#
# ── Category ──────────────────────────────────────
#  category        - Category identifier (must match a key in categories.yml)
#                    Omit or leave blank for uncategorised tags.
#
# ── Placeholders available in name/lore ──────────
#  {tag}           - This tag's formatted string
#  {tag_id}        - This tag's identifier
#  {player}        - Player's name
#  {player_tag}    - Player's currently active tag (or 'None')

