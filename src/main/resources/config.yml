# Aliases for the /tags GUI command.
# ALL of these will be registered as full commands that open the tags GUI.
# Changes take effect on server restart (or full reload).
command-aliases:
  - tags
  - tag
  - mytag

# Category mode: when true, /tags opens a category selection menu.
# Players can also use /tags all to bypass the category menu and see every tag.
categories:
  enabled: false
