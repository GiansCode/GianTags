    item:
      type: OAK_SIGN
      name: '<white><bold>General</bold></white>'
      lore:
        - '<gray>General tags for all players.</gray>'
        - ''
        - '<dark_gray>{tag_count} tag(s) available</dark_gray>'
        - ''
        - '<yellow>➜ <white>Click to browse</white></yellow>'

  'fun':
    name: 'Fun'
    position: 4
    item:
      type: SLIME_BALL
      name: '<green><bold>Fun</bold></green>'
      lore:
        - '<gray>Quirky and humorous tags.</gray>'
        - ''
        - '<dark_gray>{tag_count} tag(s) available</dark_gray>'
        - ''
        - '<yellow>➜ <white>Click to browse</white></yellow>'

  'skill':
    name: 'Skill'
    position: 5
    item:
      type: IRON_SWORD
      name: '<aqua><bold>Skill</bold></aqua>'
      lore:
        - '<gray>Playstyle and skill tags.</gray>'
        - ''
        - '<dark_gray>{tag_count} tag(s) available</dark_gray>'
        - ''
        - '<yellow>➜ <white>Click to browse</white></yellow>'
      flags:
        - HIDE_ATTRIBUTES

  'personality':
    name: 'Personality'
    position: 6
    item:
      type: TOTEM_OF_UNDYING
      name: '<light_purple><bold>Personality</bold></light_purple>'
      lore:
        - '<gray>Tags that reflect your vibe.</gray>'
        - ''
        - '<dark_gray>{tag_count} tag(s) available</dark_gray>'
        - ''
        - '<yellow>➜ <white>Click to browse</white></yellow>'

  'cosmetic':
    name: 'Cosmetic'
    position: 7
    item:
      type: PINK_DYE
      name: '<gradient:#ff0000:#8b00ff><bold>Cosmetic</bold></gradient>'
      lore:
        - '<gray>Aesthetic and visual tags.</gray>'
