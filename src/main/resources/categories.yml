# ┌─────────────────────────────────────────────────┐
# │                   GianTags                      │
# │         Categories Configuration               │
# └─────────────────────────────────────────────────┘
#
# Requires `categories.enabled: true` in config.yml.
#
# Each category entry:
#   name       - Display name used in titles and {category_name} placeholder
#   position   - Sort order in the categories GUI (lower = earlier)
#   item       - Item displayed in the categories selection GUI
#
# ── Placeholders available in category item name/lore ────────────────────────
#  {category_name}  - This category's display name
#  {tag_count}      - Number of tags available to the player in this category
#  {player}         - Player's name
#  {player_tag}     - Player's currently active formatted tag (or 'None')
#  {player_tag_id}  - Player's currently active tag ID (or 'none')

categories:

  'staff':
    name: 'Staff'
    position: 1
    item:
      type: BLAZE_ROD
      name: '<red><bold>Staff</bold></red>'
      lore:
        - '<gray>Tags for server personnel.</gray>'
        - ''
        - '<dark_gray>{tag_count} tag(s) available</dark_gray>'
        - ''
        - '<yellow>➜ <white>Click to browse</white></yellow>'
      glow: true
      flags:
        - HIDE_ENCHANTS

  'donor':
    name: 'Donor'
    position: 2
    item:
      type: GOLD_INGOT
      name: '<gold><bold>Donor</bold></gold>'
      lore:
        - '<gray>Tags for server supporters.</gray>'
        - ''
        - '<dark_gray>{tag_count} tag(s) available</dark_gray>'
        - ''
        - '<yellow>➜ <white>Click to browse</white></yellow>'
      glow: true
      flags:
        - HIDE_ENCHANTS

  'general':
