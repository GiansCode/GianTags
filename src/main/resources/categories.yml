# ── GUI Settings ──────────────────────────────────────────────────────────────
# Settings for the categories selection screen (/tags when categories enabled)
# and for how the tags GUI looks when browsing a specific category.

gui:
  title: '<dark_gray>✦ <gold>Categories</gold> ✦</dark_gray>'

  # Total rows (1-6). Last row is the navigation row.
  rows: 3

  # Category slots per page. For 3 rows: 18 (rows 1-2) with row 3 as nav.
  page-size: 18

  # How often the GUI refreshes in ticks (20 ticks = 1 second)
  update-interval: 10

  # Filler for empty category slots
  filler:
    enabled: true
    item:
      type: BLACK_STAINED_GLASS_PANE
      name: ' '

  # Title override for the tags GUI when browsing a specific category.
  # {category_name} is replaced with the category's display name.
  tags-title: '<dark_gray>✦ <gold>{category_name}</gold> Tags ✦</dark_gray>'

  # "Back to categories" button shown in the tags GUI when browsing a category.
  # Place it in a nav-filler slot of gui.yml (default slot 47 is a filler slot).
  back-button:
    slot: 47
    item:
      type: ARROW
      name: '<yellow>◀ <white>Back to Categories</white></yellow>'
      lore:
        - ''
        - '<gray>Return to the categories menu</gray>'

  # ── Navigation items for the categories GUI ──────────────────────────────
  # For a 3-row GUI, slots 18-26 = the last (nav) row.
  navigation:
    previous-page:
      slot: 21
      item:
        type: ARROW
        name: '<yellow>◀ <white>Previous Page</white></yellow>'
        lore:
          - ''
          - '<gray>Page <white>{page}</white> of <white>{pages}</white></gray>'
          - ''
          - '<yellow>Click to go back</yellow>'

    next-page:
      slot: 23
      item:
        type: ARROW
        name: '<white>Next Page</white> <yellow>▶</yellow>'
        lore:
          - ''
          - '<gray>Page <white>{page}</white> of <white>{pages}</white></gray>'
          - ''
          - '<yellow>Click to continue</yellow>'

    close:
      slot: 22
      item:
        type: BARRIER
        name: '<red>✖ <white>Close Menu</white></red>'
        lore:
          - ''
          - '<gray>Click to close the menu</gray>'

    # Current tag display — same two states (has-tag / no-tag) as in gui.yml
    current-tag:
      slot: 18
      has-tag:
        type: PLAYER_HEAD
        name: '<yellow>Current Tag</yellow>'
        lore:
          - '<gray>Your active tag:</gray>'
          - ' <white>{player_tag}</white>'
          - ''
          - '<red>✖ <gray>Click to remove your tag</gray></red>'
        glow: true
        flags:
          - HIDE_ENCHANTS
      no-tag:
        type: PAPER
        name: '<yellow>Current Tag</yellow>'
        lore:
          - '<gray>You have no active tag.</gray>'
          - ''
          - '<yellow>Select a tag from the menu!</yellow>'

    nav-filler:
      enabled: true
      slots:
        - 19
        - 20
        - 24
        - 25
        - 26
      item:
        type: GRAY_STAINED_GLASS_PANE
        name: ' '
